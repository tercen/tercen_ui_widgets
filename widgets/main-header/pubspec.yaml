name: main_header_app
description: Tercen main header widget. Extends header skeleton with Tercen brand mark SVG.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  get_it: ^8.0.3
  shared_preferences: ^2.2.2
  font_awesome_flutter: ^10.8.0
  web: ^0.5.1
  flutter_svg: ^2.0.17
  sci_tercen_client:
    git:
      url: https://github.com/tercen/sci_tercen_client
      ref: 1.16.1
      path: sci_tercen_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/TercenID_Final_TM_C_no_tag.svg
